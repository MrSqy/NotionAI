version: '3.9'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: notionai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-notionai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me_in_env}
      POSTGRES_DB: ${POSTGRES_DB:-notionai}
    # Host port mapping removed to avoid conflicts; internal Docker network access still works
    # ports:
    #   - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notionai -d notionai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: notionai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: notionai_backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://notionai:change_me_in_env@postgres:5432/notionai}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PORT: ${PORT:-3001}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    # NOTE: This command is optimized for local development (hot-reload via start:dev).
    # For production, change to: npm run start:prod
    # And remove the bind-mount volumes above.
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: notionai_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # NOTE: This command is optimized for local development (Vite HMR).
    # For production, build the frontend and serve via nginx or a static host.
    # And remove the bind-mount volumes above.
    command: npm run dev -- --host

volumes:
  postgres_data:
